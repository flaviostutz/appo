services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: stutzthings-local-mosquitto
    environment:
      MQTT_USERNAME: test
      MQTT_PASSWORD: test
    command:
      - /bin/sh
      - -ec
      - |
        cat >/mosquitto/config/mosquitto.conf <<'EOF'
        listener 1883
        allow_anonymous false
        password_file /mosquitto/config/passwd
        persistence true
        persistence_location /mosquitto/data/
        log_dest stdout
        log_type error
        log_type warning
        log_type notice
        log_type information
        EOF
        mosquitto_passwd -b -c /mosquitto/config/passwd "$${MQTT_USERNAME}" "$${MQTT_PASSWORD}"
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    volumes:
      - ./.data/mosquitto:/mosquitto/data

  influxdb:
    image: influxdb:3-core
    container_name: stutzthings-local-influxdb3
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --http-bind=0.0.0.0:8086
      - --admin-token-file=/run/secrets/admin-token
    ports:
      - "8086:8086"
    volumes:
      - ./.data/influxdb3:/var/lib/influxdb3/data
      - ./influxdb/admin-token.json:/run/secrets/admin-token:ro

  grafana:
    image: grafana/grafana:11.5.2
    container_name: stutzthings-local-grafana
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    volumes:
      - ./.data/grafana/data:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro